<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Dexterity">
  <!--
    Marca Dexterity (pinwheel) — 4 pétalas em moinho, 3 grafite + 1 cerceta (topo-direita).
    Uma única pétala (#lf) é replicada com rotações de 90°. Cores oficiais do brand.
    Grafite #404040 · Cerceta #17A398. Fundo transparente (serve de favicon e cabeçalho).
  -->
  <defs>
    <path id="lf" d="M6 6 L50 6 L50 30 C 50 44, 40 48, 24 48 Z"/>
  </defs>
  <use href="#lf" fill="#404040"/>
  <use href="#lf" fill="#17A398" transform="rotate(90 50 50)"/>
  <use href="#lf" fill="#404040" transform="rotate(180 50 50)"/>
  <use href="#lf" fill="#404040" transform="rotate(270 50 50)"/>
</svg>
