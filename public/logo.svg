      <path d="M0 0 C 4 10 10 18 24 24 C 18 10 10 4 0 0 Z" fill="#98569A"/>
      <path d="M0 0 C -10 4 -18 10 -24 24 C -10 18 -4 10 0 0 Z" fill="#FFA436"/>
      <path d="M0 0 C -4 -10 -10 -18 -24 -24 C -18 -10 -10 -4 0 0 Z" fill="#597C59"/>
